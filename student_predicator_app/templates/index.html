<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Score Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .score {
            font-size: 64px;
            font-weight: bold;
            margin: 20px 0;
        }

        .grade {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .tip {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            color: #856404;
        }

        .formula-info {
            margin-top: 15px;
            padding: 10px;
            background: #e8f4fd;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-button {
            flex: 1;
            background: #6c757d;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            transition: background 0.3s;
        }

        .nav-button:hover {
            background: #5a6268;
            transform: none;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .range-value {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }

            .score {
                font-size: 48px;
            }

            .grade {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Student Score Predictor</h1>
            <p>Enter your study hours to predict your final score</p>
        </div>

        <div class="content">
            <form action="/predict" method="POST">
                <div class="form-group">
                    <label for="hours">📚 Hours Studied per Day:</label>
                    <input type="number" step="0.5" name="hours" id="hours" placeholder="Enter 1-12 hours" min="0"
                        max="15" required oninput="updateRangeValue(this.value)">
                    <div class="range-value" id="rangeValue">Enter a value</div>
                </div>

                <button type="submit">🔮 Predict My Score</button>
            </form>

            <div class="nav-buttons">
                <a href="/" class="nav-button">🏠 Home</a>
                <a href="/about" class="nav-button">ℹ️ About</a>
            </div>

            {{ result_html | safe }}
        </div>

        <div class="footer">
            <p>💡 This prediction is based on historical student data</p>
            <p>📊 Model accuracy: ±{{ accuracy }} points</p>
            <p>🎯 Study more = Score more!</p>
        </div>
    </div>

    <script>
        function updateRangeValue(value) {
            const display = document.getElementById('rangeValue');
            if (value) {
                display.innerHTML = `Selected: ${value} hours/day`;
                if (value < 3) {
                    display.style.color = "#e74c3c";
                    display.innerHTML += " (Low)";
                } else if (value < 6) {
                    display.style.color = "#f39c12";
                    display.innerHTML += " (Average)";
                } else {
                    display.style.color = "#27ae60";
                    display.innerHTML += " (Good!)";
                }
            } else {
                display.innerHTML = "Enter a value";
                display.style.color = "#666";
            }
        }

        // Add animation to result when it appears
        document.addEventListener('DOMContentLoaded', function () {
            const result = document.querySelector('.result');
            if (result) {
                result.style.animation = 'fadeIn 0.5s ease-in';
            }
        });
    </script>
</body>

</html>
